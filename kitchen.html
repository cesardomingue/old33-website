<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Display — Old 33</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --gold:   #c8881a;
      --amber:  #d97706;
      --red:    #ef4444;
      --green:  #16a34a;
      --green2: #15803d;
      --bg:     #080808;
      --hdr:    #0a0a0a;
      --card:   #0e0e0e;
      --border: rgba(255,255,255,.07);
      --border2:rgba(255,255,255,.12);
      --white:  #f0ede8;
      --muted:  #555;
      --dim:    #333;
    }

    html, body {
      height:100%; background:var(--bg);
      font-family:'Inter',sans-serif; color:var(--white);
      overflow-x:hidden; -webkit-font-smoothing:antialiased;
    }

    /* ── PIN SCREEN ── */
    #pinScreen {
      position:fixed; inset:0; background:var(--bg);
      display:flex; align-items:center; justify-content:center; z-index:9999;
      background-image:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(200,136,26,.05) 0%, transparent 70%);
    }
    .pin-wrap { display:flex; flex-direction:column; align-items:center; gap:28px; }
    .pin-logo { height:64px; width:auto; display:block; margin:0 auto; filter:brightness(1.05); }
    .pin-rule  { width:30px; height:1px; background:rgba(200,136,26,.45); margin:12px auto 0; }
    .pin-sub   { font-size:10px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:8px; text-align:center; }
    .pin-label { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; font-weight:500; }
    .pin-dots  { display:flex; gap:16px; }
    .pin-dot   { width:11px; height:11px; border-radius:50%; border:1px solid rgba(255,255,255,.15); background:transparent; transition:all .2s; }
    .pin-dot.filled { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(200,136,26,.45); }
    .pin-error { font-size:12px; color:var(--red); height:16px; text-align:center; font-weight:500; }
    .pin-pad   { display:grid; grid-template-columns:repeat(3,76px); gap:8px; }
    .pin-btn   {
      width:76px; height:76px; border-radius:50%;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
      color:var(--white); font-family:'Inter',sans-serif; font-size:24px; font-weight:300;
      cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center;
      user-select:none;
    }
    .pin-btn:hover  { background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.18); }
    .pin-btn:active { background:var(--gold); border-color:var(--gold); color:#000; transform:scale(.93); }
    .pin-btn.zero   { grid-column:2; }
    .pin-btn.del    { background:transparent; border-color:transparent; color:var(--muted); font-size:20px; }
    .pin-btn.del:hover { color:var(--white); background:transparent; border-color:transparent; }

    /* ── HEADER ── */
    .kds-hdr {
      position:sticky; top:0; z-index:100;
      background:var(--hdr); border-bottom:1px solid var(--border);
      height:64px; padding:0 24px;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
    }
    .kds-hdr-left { display:flex; align-items:center; gap:16px; }
    .kds-logo { height:36px; width:auto; display:block; filter:brightness(1.05); }

    .kds-divider { width:1px; height:28px; background:var(--border); }

    .kds-stat {
      display:flex; flex-direction:column; align-items:center; line-height:1;
    }
    .kds-stat-num {
      font-family:'Oswald',sans-serif; font-size:28px; font-weight:700;
      color:var(--gold); line-height:1;
    }
    .kds-stat-lbl {
      font-size:9px; color:var(--muted); text-transform:uppercase;
      letter-spacing:1.5px; margin-top:3px; font-weight:600;
    }

    .kds-hdr-center { display:flex; align-items:center; gap:14px; }

    .live-pill {
      display:flex; align-items:center; gap:6px;
      background:rgba(22,163,74,.08); border:1px solid rgba(22,163,74,.2);
      padding:5px 12px; border-radius:20px;
    }
    .live-dot { width:5px; height:5px; border-radius:50%; background:#22c55e; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .live-txt { font-size:10px; font-weight:700; color:#22c55e; letter-spacing:.8px; text-transform:uppercase; }
    .live-txt.err { color:var(--amber); }

    .sound-btn {
      display:flex; align-items:center; gap:7px; padding:6px 12px;
      background:rgba(255,255,255,.04); border:1px solid var(--border2);
      border-radius:20px; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif;
      font-size:10px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase;
    }
    .sound-btn:hover { border-color:rgba(255,255,255,.2); color:var(--white); }
    .sound-btn.on  { background:rgba(22,163,74,.08); border-color:rgba(22,163,74,.25); color:#22c55e; }
    .sound-icon { display:flex; align-items:center; }

    .kds-hdr-right {}
    .kds-time-big  { font-family:'Oswald',sans-serif; font-size:28px; font-weight:600; color:var(--white); letter-spacing:1px; line-height:1; text-align:right; }
    .kds-date-sm   { font-size:10px; color:var(--muted); text-align:right; margin-top:3px; letter-spacing:.5px; }

    /* ── STATUS BAR ── */
    .kds-statusbar {
      border-bottom:1px solid var(--border);
      padding:0 24px; height:36px;
      display:flex; align-items:center; gap:20px;
      font-size:11px; color:var(--muted);
    }
    .legend-item { display:flex; align-items:center; gap:6px; }
    .legend-pip  { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
    .kds-refresh { margin-left:auto; font-size:10px; color:var(--dim); }

    /* ── EMPTY STATE ── */
    #emptyState {
      display:none; flex-direction:column; align-items:center; justify-content:center;
      min-height:calc(100vh - 100px); gap:14px;
    }
    .empty-icon { color:var(--dim); }
    .empty-title {
      font-family:'Oswald',sans-serif; font-size:22px; font-weight:600;
      color:var(--dim); letter-spacing:2px; text-transform:uppercase;
    }
    .empty-sub { font-size:13px; color:var(--muted); text-align:center; line-height:1.7; max-width:280px; }

    /* ── GRID ── */
    #ordersGrid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
      gap:12px;
      padding:14px 16px 40px;
      align-items:start;
    }

    /* ── ORDER CARD ── */
    .order-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:10px;
      overflow:hidden;
      border-left:4px solid var(--gold);
      animation:slideIn .25s ease;
    }
    .order-card.warn   { border-left-color:var(--amber); }
    .order-card.urgent { border-left-color:var(--red); }
    .order-card.new-card { animation:slideIn .25s ease, newPop 2s ease; }

    @keyframes slideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes newPop  { 0%,100%{background:var(--card)} 10%,60%{background:#130f00} }

    /* Card header row */
    .c-head {
      padding:11px 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.02);
    }
    .c-head-left { display:flex; align-items:center; gap:10px; }
    .c-num {
      font-family:'Oswald',sans-serif; font-size:12px; font-weight:500;
      color:var(--gold); letter-spacing:2px;
    }
    .c-new-tag {
      font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
      background:var(--gold); color:#000; padding:2px 7px; border-radius:3px;
    }
    .c-placed { font-size:11px; color:var(--muted); }

    /* Customer + timer row */
    .c-customer {
      padding:11px 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--border);
    }
    .c-name {
      font-family:'Oswald',sans-serif; font-size:28px; font-weight:700;
      color:var(--white); line-height:1; letter-spacing:.3px;
    }
    .c-phone { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:.5px; }

    .c-timer {
      display:flex; flex-direction:column; align-items:center;
      background:#0a0a0a; border:1px solid rgba(255,255,255,.08);
      border-radius:8px; padding:10px 14px; min-width:68px; text-align:center;
      flex-shrink:0;
    }
    .c-timer-num {
      font-family:'Oswald',sans-serif; font-size:30px; font-weight:700;
      line-height:1; color:var(--white);
    }
    .c-timer-num.warn   { color:var(--amber); }
    .c-timer-num.urgent { color:var(--red); animation:timerPulse 1s infinite; }
    @keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .c-timer-lbl {
      font-size:9px; color:var(--muted); text-transform:uppercase;
      letter-spacing:1.5px; margin-top:3px;
    }

    /* Items */
    .c-items {
      padding:4px 0;
      max-height:220px; overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }
    .c-items::-webkit-scrollbar { width:3px; }
    .c-items::-webkit-scrollbar-track { background:transparent; }
    .c-items::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:2px; }
    .c-item {
      display:flex; align-items:flex-start; gap:12px;
      padding:10px 16px; border-bottom:1px solid rgba(255,255,255,.04);
    }
    .c-item:last-child { border-bottom:none; }
    .c-qty {
      width:28px; height:28px; border-radius:5px; flex-shrink:0;
      background:rgba(200,136,26,.1); border:1px solid rgba(200,136,26,.22);
      color:var(--gold); font-size:13px; font-weight:700;
      display:flex; align-items:center; justify-content:center; margin-top:1px;
    }
    .c-item-info { flex:1; min-width:0; }
    .c-item-name { font-size:16px; font-weight:600; color:var(--white); line-height:1.2; }
    .c-item-mods { font-size:11.5px; color:var(--muted); margin-top:4px; line-height:1.55; }
    .c-item-price { font-size:12px; color:var(--dim); flex-shrink:0; margin-top:3px; }

    /* Note */
    .c-note {
      margin:0 16px 12px;
      background:rgba(200,136,26,.04); border-left:2px solid var(--gold);
      border-radius:0 6px 6px 0; padding:10px 12px;
    }
    .c-note-lbl {
      font-size:9px; color:var(--gold); text-transform:uppercase;
      letter-spacing:2px; font-weight:700; margin-bottom:4px;
    }
    .c-note-txt { font-size:13px; color:rgba(255,255,255,.6); line-height:1.55; }

    /* Footer */
    .c-foot { border-top:1px solid var(--border); }
    .c-totals {
      display:flex; align-items:center; justify-content:flex-end;
      padding:10px 16px;
    }
    .c-totals-detail { display:none; }
    .c-total-amt {
      font-family:'Oswald',sans-serif; font-size:24px; font-weight:700; color:var(--white);
    }

    /* Ready button */
    .c-ready-btn {
      width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
      background:var(--green); color:#fff; border:none;
      padding:14px 24px; cursor:pointer; transition:background .15s, opacity .15s;
      font-family:'Oswald',sans-serif; font-size:14px; font-weight:600;
      letter-spacing:3px; text-transform:uppercase;
    }
    .c-ready-btn:hover  { background:var(--green2); }
    .c-ready-btn:active { opacity:.88; }
    .c-ready-btn.busy {
      background:#161616; color:var(--muted); pointer-events:none;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

    /* ── RESPONSIVE ── */
    @media(max-width:520px){
      #ordersGrid { grid-template-columns:1fr; padding:12px 12px 32px; }
      .kds-hdr { padding:0 14px; }
      .kds-statusbar { display:none; }
      .c-name { font-size:28px; }
    }
    @media(max-width:700px){
      .kds-hdr-center .sound-btn .sound-icon { display:none; }
    }
  </style>
</head>
<body>

<!-- ═══ PIN SCREEN ═══ -->
<div id="pinScreen">
  <div class="pin-wrap">
    <div>
      <img src="images/logo-clean.png" alt="Old 33" class="pin-logo">
      <div class="pin-rule"></div>
      <div class="pin-sub">Kitchen Display System</div>
    </div>
    <div class="pin-label">Enter PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pp('1')">1</button>
      <button class="pin-btn" onclick="pp('2')">2</button>
      <button class="pin-btn" onclick="pp('3')">3</button>
      <button class="pin-btn" onclick="pp('4')">4</button>
      <button class="pin-btn" onclick="pp('5')">5</button>
      <button class="pin-btn" onclick="pp('6')">6</button>
      <button class="pin-btn" onclick="pp('7')">7</button>
      <button class="pin-btn" onclick="pp('8')">8</button>
      <button class="pin-btn" onclick="pp('9')">9</button>
      <button class="pin-btn zero" onclick="pp('0')">0</button>
      <button class="pin-btn del" onclick="pd()">&#9003;</button>
    </div>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<div class="kds-hdr">
  <div class="kds-hdr-left">
    <img src="images/logo-clean.png" alt="Old 33" class="kds-logo">
    <div class="kds-divider"></div>
    <div class="kds-stat">
      <div class="kds-stat-num" id="pendingCount">0</div>
      <div class="kds-stat-lbl">Pending</div>
    </div>
  </div>

  <div class="kds-hdr-center">
    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-txt" id="liveLabel">Live</span>
    </div>
    <button class="sound-btn on" id="soundBtn" onclick="toggleSound()">
      <span class="sound-icon" id="soundIcon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </span>
      <span id="soundLbl">Sound On</span>
    </button>
  </div>

  <div class="kds-hdr-right">
    <div class="kds-time-big" id="kClock">--:--</div>
    <div class="kds-date-sm" id="kDate">---</div>
  </div>
</div>

<!-- ═══ STATUS BAR ═══ -->
<div class="kds-statusbar">
  <div class="legend-item">
    <div class="legend-pip" style="background:var(--gold)"></div>
    <span>0 – 9 min</span>
  </div>
  <div class="legend-item">
    <div class="legend-pip" style="background:var(--amber)"></div>
    <span>10 – 19 min — caution</span>
  </div>
  <div class="legend-item">
    <div class="legend-pip" style="background:var(--red)"></div>
    <span>20+ min — urgent</span>
  </div>
  <div class="kds-refresh" id="lastRefresh">Loading…</div>
</div>

<!-- ═══ EMPTY STATE ═══ -->
<div id="emptyState">
  <div class="empty-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" width="44" height="44">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
    </svg>
  </div>
  <div class="empty-title">All Clear</div>
  <div class="empty-sub">No pending orders right now.<br>New orders will appear here automatically.</div>
</div>

<!-- ═══ ORDERS GRID ═══ -->
<div id="ordersGrid"></div>

<script>
  /* ─── CONFIG ─── */
  const SB_URL  = 'https://nfanxvqfyfqcbsdgxowq.supabase.co';
  const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mYW54dnFmeWZxY2JzZGd4b3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Nzk3OTAsImV4cCI6MjA5MDU1NTc5MH0.mdcX5W246-ccjyQTeEXFTupa0lWE1nHXBAWN9r16OCs';
  const SMS_URL = 'https://script.google.com/macros/s/AKfycbyRhSuHPCUWK3ua_2mokRI8X3IUHWMkrqVP11l7zj1Tn-qUhzGFqNnXOipXxUj7r0m6/exec';
  const PIN_H   = 'd3b63363e3c4234a3fa5ad9e7dac9449c7fc9a4b3c28236247d3bace953f9de7';
  const H       = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY };

  /* ─── STATE ─── */
  let knownIds  = null; // null = first load (no bell on initial draw)
  let soundOn   = true;

  /* ─── HASH ─── */
  async function hashPin(v) {
    const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
    return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
  }

  /* ─── PIN LOCKOUT ─── */
  const MAX_ATT = 5, LOCK_MS = 15*60*1000, PG = 'kitchen';
  let clientIP = null, locked = false;

  async function fetchIP() {
    try { clientIP = (await (await fetch('https://api.ipify.org?format=json')).json()).ip; }
    catch { clientIP = null; }
  }
  async function getAttempts() {
    if (!clientIP) return [];
    const since = new Date(Date.now() - LOCK_MS).toISOString();
    try {
      const r = await fetch(
        `${SB_URL}/rest/v1/pin_attempts?ip=eq.${clientIP}&page=eq.${PG}&attempted_at=gte.${encodeURIComponent(since)}&order=attempted_at.asc`,
        { headers: H }
      );
      return r.ok ? await r.json() : [];
    } catch { return []; }
  }
  async function logAttempt() {
    if (!clientIP) return;
    try {
      await fetch(`${SB_URL}/rest/v1/pin_attempts`, {
        method:'POST', headers:{...H,'Content-Type':'application/json'},
        body: JSON.stringify({ page:PG, ip:clientIP })
      });
    } catch {}
  }
  function showLockout(exp) {
    locked = true;
    const err = document.getElementById('pinError');
    const pad = document.querySelector('.pin-pad');
    pad.style.opacity = '0.3'; pad.style.pointerEvents = 'none';
    (function tick() {
      const left = Math.max(0, Math.ceil((exp - Date.now()) / 1000));
      if (!left) { locked=false; err.textContent=''; pad.style.opacity='1'; pad.style.pointerEvents=''; return; }
      err.textContent = `Locked — ${Math.floor(left/60)}:${(left%60).toString().padStart(2,'0')}`;
      setTimeout(tick, 1000);
    })();
  }

  /* ─── BOOT ─── */
  if (sessionStorage.getItem('kds_auth') === '1') {
    document.getElementById('pinScreen').style.display = 'none';
    startKDS();
  } else {
    fetchIP().then(async () => {
      const atts = await getAttempts();
      if (atts.length >= MAX_ATT) {
        const exp = new Date(atts[MAX_ATT-1].attempted_at).getTime() + LOCK_MS;
        if (exp > Date.now()) { showLockout(exp); return; }
      }
      if (atts.length > 0) {
        const rem = MAX_ATT - atts.length;
        document.getElementById('pinError').textContent = `${rem} attempt${rem===1?'':'s'} remaining`;
      }
    });
  }

  let pinStr = '';
  function pp(n) {
    if (locked || pinStr.length >= 4) return;
    pinStr += n;
    document.getElementById('d' + (pinStr.length-1)).classList.add('filled');
    if (pinStr.length === 4) {
      setTimeout(async () => {
        if (await hashPin(pinStr) === PIN_H) {
          sessionStorage.setItem('kds_auth','1');
          const ps = document.getElementById('pinScreen');
          ps.style.transition = 'opacity .35s'; ps.style.opacity = '0';
          setTimeout(() => { ps.style.display = 'none'; startKDS(); }, 350);
        } else {
          await logAttempt();
          const atts = await getAttempts();
          const rem  = MAX_ATT - atts.length;
          if (rem <= 0) showLockout(new Date(atts[MAX_ATT-1].attempted_at).getTime() + LOCK_MS);
          else {
            document.getElementById('pinError').textContent = `Incorrect PIN — ${rem} attempt${rem===1?'':'s'} remaining`;
            setTimeout(() => { const e=document.getElementById('pinError'); if(e.textContent.startsWith('Incorrect')) e.textContent=''; }, 2500);
          }
          pinStr = '';
          for (let i=0;i<4;i++) document.getElementById('d'+i).classList.remove('filled');
        }
      }, 180);
    }
  }
  function pd() {
    if (locked || !pinStr.length) return;
    pinStr = pinStr.slice(0,-1);
    document.getElementById('d'+pinStr.length).classList.remove('filled');
    document.getElementById('pinError').textContent = '';
  }

  /* ─── SOUND ─── */
  function toggleSound() {
    soundOn = !soundOn;
    const btn = document.getElementById('soundBtn');
    const bellOn  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`;
    const bellOff = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M13.73 21a2 2 0 01-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0118 8"/><path d="M6.26 6.26A5.86 5.86 0 006 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 00-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    document.getElementById('soundIcon').innerHTML = soundOn ? bellOn : bellOff;
    document.getElementById('soundLbl').textContent = soundOn ? 'Sound On' : 'Sound Off';
    btn.classList.toggle('on', soundOn);
  }
  function playBell() {
    if (!soundOn) return;
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      [880,1100,880].forEach((f,i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f; o.type = 'sine';
        const t = ctx.currentTime + i*.15;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(.3, t+.01);
        g.gain.exponentialRampToValueAtTime(.001, t+.4);
        o.start(t); o.stop(t+.4);
      });
    } catch {}
  }

  /* ─── HELPERS ─── */
  const esc = s => String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
  const getMins = iso => Math.floor((Date.now() - new Date(iso)) / 60000);
  const urgency = m => m >= 20 ? 'urgent' : m >= 10 ? 'warn' : '';

  /* ─── CLOCK ─── */
  function updateClock() {
    const now = new Date();
    const cl = document.getElementById('kClock');
    const dl = document.getElementById('kDate');
    if (cl) cl.textContent = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true,timeZone:'America/New_York'});
    if (dl) dl.textContent = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'America/New_York'});
  }

  /* ─── TIMER REFRESH ─── */
  function refreshTimers() {
    document.querySelectorAll('.order-card').forEach(card => {
      const iso = card.dataset.created;
      if (!iso) return;
      const mins = getMins(iso);
      const u    = urgency(mins);
      // Update card border urgency
      card.className = 'order-card' + (u ? ' '+u : '');
      // Update timer num
      const tn = card.querySelector('.c-timer-num');
      if (tn) { tn.textContent = mins; tn.className = 'c-timer-num' + (u ? ' '+u : ''); }
    });
  }

  /* ─── MARK READY ─── */
  async function markReady(id, btn) {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg> Marking done…`;
    btn.classList.add('busy');

    const card  = document.querySelector(`[data-id="${id}"]`);
    const name  = card?.querySelector('.c-name')?.textContent || '';
    const rawPh = card?.querySelector('.c-phone')?.textContent || '';
    const digits= rawPh.replace(/\D/g,'');
    const phone = digits.length===10 ? '+1'+digits : (digits.length===11&&digits[0]==='1' ? '+'+digits : rawPh);

    try {
      const r = await fetch(`${SB_URL}/rest/v1/orders?id=eq.${id}`, {
        method:'PATCH',
        headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},
        body: JSON.stringify({ status:'done' })
      });

      if (!r.ok) throw new Error('HTTP '+r.status);

      // SMS — fire and forget
      fetch(SMS_URL, {
        method:'POST', mode:'no-cors',
        body: JSON.stringify({ name, phone }),
        headers: { 'Content-Type':'text/plain' }
      }).catch(()=>{});

      // Animate out
      if (card) {
        card.style.transition = 'opacity .25s, transform .25s';
        card.style.opacity = '0';
        card.style.transform = 'scale(.97)';
        setTimeout(() => { card.remove(); updateCount(); }, 260);
      }
      if (knownIds) knownIds.delete(id);

    } catch {
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg> ORDER READY`;
      btn.classList.remove('busy');
    }
  }

  /* ─── COUNT ─── */
  function updateCount() {
    const n = document.querySelectorAll('.order-card').length;
    document.getElementById('pendingCount').textContent = n;
    document.getElementById('emptyState').style.display  = n===0 ? 'flex' : 'none';
    document.getElementById('ordersGrid').style.display  = n===0 ? 'none' : 'grid';
  }

  /* ─── RENDER ─── */
  function renderOrders(orders) {
    const grid = document.getElementById('ordersGrid');
    document.getElementById('pendingCount').textContent = orders.length;

    if (!orders.length) {
      grid.style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
      return;
    }
    grid.style.display = 'grid';
    document.getElementById('emptyState').style.display = 'none';

    // Remove cards that are no longer pending
    grid.querySelectorAll('.order-card').forEach(c => {
      if (!orders.find(o => o.id === c.dataset.id)) {
        c.style.transition = 'opacity .2s'; c.style.opacity = '0';
        setTimeout(() => c.remove(), 210);
      }
    });

    orders.forEach(order => {
      const mins  = getMins(order.created_at);
      const u     = urgency(mins);
      const isNew = knownIds !== null && !knownIds.has(order.id);

      if (knownIds) knownIds.add(order.id);

      // Update existing card timer
      const existing = grid.querySelector(`[data-id="${order.id}"]`);
      if (existing) {
        const tn = existing.querySelector('.c-timer-num');
        if (tn) { tn.textContent = mins; tn.className = 'c-timer-num'+(u?' '+u:''); }
        existing.className = 'order-card'+(u?' '+u:'');
        return;
      }

      if (isNew) playBell();

      const items = Array.isArray(order.items) ? order.items : [];
      const itemsHtml = items.map(it => `
        <div class="c-item">
          <div class="c-qty">${esc(it.qty||1)}</div>
          <div class="c-item-info">
            <div class="c-item-name">${esc(it.name)}</div>
            ${it.mods ? `<div class="c-item-mods">${esc(it.mods)}</div>` : ''}
          </div>
          <div class="c-item-price">$${parseFloat(it.price||0).toFixed(2)}</div>
        </div>`).join('');

      const tip = parseFloat(order.tip||0);
      const el  = document.createElement('div');
      el.className  = 'order-card'+(u?' '+u:'')+(isNew?' new-card':'');
      el.dataset.id = order.id;
      el.dataset.created = order.created_at;

      el.innerHTML = `
        <div class="c-head">
          <div class="c-head-left">
            <span class="c-num">${esc(order.order_num||'—')}</span>
            ${isNew ? '<span class="c-new-tag">New</span>' : ''}
          </div>
          <span class="c-placed">${new Date(order.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})}</span>
        </div>

        <div class="c-customer">
          <div>
            <div class="c-name">${esc(order.customer_name||'Guest')}</div>
            <div class="c-phone">${esc(order.customer_phone||'—')}</div>
          </div>
          <div class="c-timer">
            <div class="c-timer-num${u?' '+u:''}">${mins}</div>
            <div class="c-timer-lbl">min</div>
          </div>
        </div>

        <div class="c-items">${itemsHtml}</div>

        ${order.notes ? `
        <div class="c-note">
          <div class="c-note-lbl">Customer Note</div>
          <div class="c-note-txt">${esc(order.notes)}</div>
        </div>` : ''}

        <div class="c-foot">
          <div class="c-totals">
            <div class="c-totals-detail">
              <div>Subtotal &nbsp;$${parseFloat(order.subtotal||0).toFixed(2)}</div>
              <div>Tax &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$${parseFloat(order.tax||0).toFixed(2)}</div>
              ${tip>0?`<div>Tip &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$${tip.toFixed(2)}</div>`:''}
            </div>
            <div class="c-total-amt">$${parseFloat(order.total||0).toFixed(2)}</div>
          </div>
          <button class="c-ready-btn" onclick="markReady('${order.id}',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>
            Order Ready
          </button>
        </div>`;

      grid.prepend(el);
    });

    document.getElementById('lastRefresh').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'});
  }

  /* ─── FETCH ─── */
  async function fetchOrders() {
    try {
      // Get pending orders OR orders with null status (handles edge cases)
      const r = await fetch(
        `${SB_URL}/rest/v1/orders?or=(status.eq.pending,status.is.null)&order=created_at.asc&limit=50`,
        { headers: H }
      );
      if (!r.ok) throw new Error('HTTP '+r.status);
      const data = await r.json();
      const orders = Array.isArray(data) ? data : [];

      // Initialize knownIds on first load (no bell)
      if (knownIds === null) {
        knownIds = new Set(orders.map(o => o.id));
      }

      renderOrders(orders);

      const ll = document.getElementById('liveLabel');
      ll.textContent = 'Live'; ll.classList.remove('err');
    } catch {
      const ll = document.getElementById('liveLabel');
      ll.textContent = 'Reconnecting…'; ll.classList.add('err');
    }
  }

  /* ─── START ─── */
  function startKDS() {
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(refreshTimers, 30000); // update timers every 30s between fetches
    fetchOrders();
    setInterval(fetchOrders, 15000);
  }
</script>
</body>
</html>
