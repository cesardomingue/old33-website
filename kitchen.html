<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Display | Old 33</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:    #c8881a;
      --gold-lt: #e09a20;
      --amber:   #d97706;
      --red:     #dc2626;
      --green:   #16a34a;
      --green-lt:#15803d;
      --bg:      #0a0a0a;
      --card:    #111111;
      --border:  #1f1f1f;
      --border2: #2a2a2a;
      --white:   #f0ede8;
      --gray:    #666;
      --dim:     #444;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--white);
      overflow-x: hidden;
    }

    /* ─────────────────────────────
       PIN SCREEN
    ───────────────────────────── */
    #pinScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .pin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .pin-brand {
      text-align: center;
    }
    .pin-brand-tag {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .pin-brand-name {
      font-family: 'Oswald', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 4px;
      line-height: 1;
    }
    .pin-brand-rule {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 14px auto 0;
    }
    .pin-brand-sub {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 10px;
    }
    .pin-label {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .pin-dots {
      display: flex;
      gap: 16px;
    }
    .pin-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: transparent;
      transition: all .15s;
    }
    .pin-dot.filled {
      background: var(--gold);
      border-color: var(--gold);
    }
    .pin-error {
      font-size: 12px;
      color: var(--red);
      height: 16px;
      text-align: center;
      letter-spacing: .5px;
    }
    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 76px);
      gap: 10px;
    }
    .pin-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: #161616;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pin-btn:active { background: var(--gold); color: #000; transform: scale(.93); }
    .pin-btn.zero { grid-column: 2; }
    .pin-btn.del { background: transparent; border-color: transparent; color: var(--dim); font-size: 20px; }
    .pin-btn.del:active { background: transparent; color: var(--white); }

    /* ─────────────────────────────
       HEADER
    ───────────────────────────── */
    .kds-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      height: 62px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kds-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .kds-badge {
      width: 36px;
      height: 36px;
      background: var(--gold);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #000;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .kds-brand-name {
      font-family: 'Oswald', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 1.5px;
      line-height: 1;
    }
    .kds-brand-sub {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .kds-mid {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .kds-live {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #1a2e1a;
      background: #0d1a0d;
    }
    .kds-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    .kds-live-txt {
      font-size: 11px;
      font-weight: 600;
      color: #22c55e;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .kds-count-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .kds-count-num {
      font-family: 'Oswald', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--gold);
    }
    .kds-count-lbl {
      font-size: 9px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .kds-clock {
      text-align: right;
    }
    .kds-time {
      font-family: 'Oswald', sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: 2px;
      line-height: 1;
    }
    .kds-date {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    /* ─────────────────────────────
       LEGEND BAR
    ───────────────────────────── */
    .kds-legend {
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      color: var(--dim);
    }
    .kds-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kds-legend-pip {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .kds-legend-refresh {
      margin-left: auto;
      font-size: 10px;
      color: var(--dim);
    }

    /* ─────────────────────────────
       EMPTY STATE
    ───────────────────────────── */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 100px);
      gap: 16px;
    }
    .empty-icon { color: #1c1c1c; }
    .empty-title {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #1e1e1e;
      letter-spacing: 2px;
    }
    .empty-sub { font-size: 13px; color: #1a1a1a; text-align: center; line-height: 1.7; }

    /* ─────────────────────────────
       GRID
    ───────────────────────────── */
    #ordersGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 16px;
      padding: 20px 24px;
      align-items: start;
    }

    /* ─────────────────────────────
       CARD
    ───────────────────────────── */
    .order-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      border-left: 4px solid var(--gold);
      animation: cardIn .3s ease;
    }
    .order-card.warning-card { border-left-color: var(--amber); }
    .order-card.urgent-card  { border-left-color: var(--red); }
    .order-card.new-order    { animation: cardIn .3s ease, newFlash 1.2s ease 2; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes newFlash {
      0%, 100% { background: var(--card); }
      50%      { background: #1a1500; }
    }

    /* Card top row */
    .card-top {
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-top-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-order-num {
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 2px;
    }
    .card-new-badge {
      background: var(--gold);
      color: #000;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .card-placed-time {
      font-size: 12px;
      color: var(--dim);
    }

    /* Customer row */
    .card-customer {
      padding: 14px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-customer-name {
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: .5px;
      line-height: 1;
    }
    .card-customer-phone {
      font-size: 13px;
      color: var(--gray);
      margin-top: 4px;
      letter-spacing: .5px;
    }
    .card-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0d0d0d;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 70px;
      text-align: center;
      flex-shrink: 0;
    }
    .card-timer-num {
      font-family: 'Oswald', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      color: var(--white);
    }
    .card-timer-num.warn { color: var(--amber); }
    .card-timer-num.urgent { color: var(--red); }
    .card-timer-lbl {
      font-size: 9px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    /* Items */
    .card-items {
      padding: 4px 0;
    }
    .card-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 16px;
      border-bottom: 1px solid #161616;
    }
    .card-item:last-child { border-bottom: none; }
    .card-item-qty {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      background: rgba(200,136,26,.12);
      border: 1px solid rgba(200,136,26,.25);
      color: var(--gold);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .card-item-info { flex: 1; min-width: 0; }
    .card-item-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
    }
    .card-item-mods {
      font-size: 12px;
      color: var(--gray);
      margin-top: 3px;
      line-height: 1.5;
    }
    .card-item-price {
      font-size: 13px;
      color: var(--dim);
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* Notes */
    .card-notes {
      margin: 0 16px 12px;
      background: rgba(200,136,26,.05);
      border-left: 2px solid var(--gold);
      padding: 10px 12px;
      border-radius: 0 4px 4px 0;
    }
    .card-notes-lbl {
      font-size: 9px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-notes-txt {
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
    }

    /* Footer */
    .card-footer {
      border-top: 1px solid var(--border);
    }
    .card-totals {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
    }
    .card-totals-detail {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.7;
    }
    .card-total-amount {
      font-family: 'Oswald', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
    }

    /* Ready button */
    .card-ready-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      padding: 17px 24px;
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s;
    }
    .card-ready-btn:hover  { background: var(--green-lt); }
    .card-ready-btn:active { opacity: .9; }
    .card-ready-btn.marking {
      background: #1a1a1a;
      color: var(--dim);
      pointer-events: none;
    }

    /* ─────────────────────────────
       SCROLLBAR
    ───────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 2px; }

    @media (max-width: 500px) {
      #ordersGrid { grid-template-columns: 1fr; padding: 12px; }
      .kds-header { padding: 0 16px; }
      .kds-legend { display: none; }
      .card-customer-name { font-size: 28px; }
    }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen">
  <div class="pin-wrap">
    <div class="pin-brand">
      <div class="pin-brand-tag">Kitchen Display System</div>
      <div class="pin-brand-name">OLD 33</div>
      <div class="pin-brand-rule"></div>
      <div class="pin-brand-sub">Beer &amp; Burger Grill &nbsp;&middot;&nbsp; Elkton, VA</div>
    </div>
    <div class="pin-label">Enter PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn zero" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinDel()">&#9003;</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="kds-header">
  <div class="kds-brand">
    <div class="kds-badge">33</div>
    <div>
      <div class="kds-brand-name">OLD 33</div>
      <div class="kds-brand-sub">Kitchen Display</div>
    </div>
  </div>
  <div class="kds-mid">
    <div class="kds-live">
      <div class="kds-live-dot"></div>
      <span class="kds-live-txt" id="liveText">Live</span>
    </div>
    <div class="kds-count-wrap">
      <div class="kds-count-num" id="orderCount">0</div>
      <div class="kds-count-lbl">Pending</div>
    </div>
  </div>
  <div class="kds-clock">
    <div class="kds-time" id="clock">--:--</div>
    <div class="kds-date" id="clockDate">---</div>
  </div>
</div>

<!-- LEGEND -->
<div class="kds-legend">
  <div class="kds-legend-item">
    <div class="kds-legend-pip" style="background:var(--gold)"></div>
    <span>New</span>
  </div>
  <div class="kds-legend-item">
    <div class="kds-legend-pip" style="background:var(--amber)"></div>
    <span>15+ min</span>
  </div>
  <div class="kds-legend-item">
    <div class="kds-legend-pip" style="background:var(--red)"></div>
    <span>25+ min — urgent</span>
  </div>
  <div class="kds-legend-refresh" id="lastRefresh">Refreshing every 15s</div>
</div>

<!-- EMPTY STATE -->
<div id="emptyState">
  <div class="empty-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="48" height="48">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
  </div>
  <div class="empty-title">All Clear</div>
  <div class="empty-sub">No pending orders.<br>New orders appear here automatically.</div>
</div>

<!-- ORDERS -->
<div id="ordersGrid"></div>

<script>
  const SUPA_URL = 'https://nfanxvqfyfqcbsdgxowq.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mYW54dnFmeWZxY2JzZGd4b3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Nzk3OTAsImV4cCI6MjA5MDU1NTc5MH0.mdcX5W246-ccjyQTeEXFTupa0lWE1nHXBAWN9r16OCs';
  const SMS_URL  = 'https://script.google.com/macros/s/AKfycbyRhSuHPCUWK3ua_2mokRI8X3IUHWMkrqVP11l7zj1Tn-qUhzGFqNnXOipXxUj7r0m6/exec';
  const PIN = '3300';

  /* PIN */
  let pinEntry = '';
  function pinPress(n) {
    if (pinEntry.length >= 4) return;
    pinEntry += n;
    document.getElementById('d' + (pinEntry.length - 1)).classList.add('filled');
    if (pinEntry.length === 4) {
      setTimeout(() => {
        if (pinEntry === PIN) {
          const ps = document.getElementById('pinScreen');
          ps.style.transition = 'opacity .35s';
          ps.style.opacity = '0';
          setTimeout(() => ps.style.display = 'none', 350);
          startKDS();
        } else {
          document.getElementById('pinError').textContent = 'Incorrect PIN';
          pinEntry = '';
          for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.remove('filled');
          setTimeout(() => document.getElementById('pinError').textContent = '', 1800);
        }
      }, 180);
    }
  }
  function pinDel() {
    if (!pinEntry.length) return;
    pinEntry = pinEntry.slice(0, -1);
    document.getElementById('d' + pinEntry.length).classList.remove('filled');
    document.getElementById('pinError').textContent = '';
  }

  /* CLOCK */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', {
      hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York'
    });
    document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', timeZone: 'America/New_York'
    });
  }

  /* HELPERS */
  function esc(s) {
    return String(s || '').replace(/[<>&"']/g, c =>
      ({ '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;', "'":'&#39;' }[c]));
  }
  function getMins(iso) {
    return Math.floor((Date.now() - new Date(iso)) / 60000);
  }
  function timerClass(mins) {
    if (mins >= 25) return 'urgent';
    if (mins >= 15) return 'warn';
    return '';
  }
  function cardClass(mins) {
    if (mins >= 25) return 'urgent-card';
    if (mins >= 15) return 'warning-card';
    return '';
  }

  /* SOUND */
  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [880, 1100].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + i * 0.15 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.35);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.35);
      });
    } catch(e) {}
  }

  /* MARK READY */
  async function markReady(id, btn) {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg> Marking done...';
    btn.classList.add('marking');

    const card = document.querySelector(`[data-id="${id}"]`);
    const name  = card?.querySelector('.card-customer-name')?.textContent || '';
    const rawPhone = card?.querySelector('.card-customer-phone')?.textContent || '';
    const digits = rawPhone.replace(/\D/g, '');
    const phone = digits.length === 10 ? '+1' + digits : (digits.length === 11 && digits[0] === '1' ? '+' + digits : rawPhone);

    try {
      await fetch(SUPA_URL + '/rest/v1/orders?id=eq.' + id, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status: 'done' })
      });

      fetch(SMS_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ name, phone }),
        headers: { 'Content-Type': 'text/plain' }
      }).catch(() => {});

      if (card) {
        card.style.transition = 'opacity .25s, transform .25s';
        card.style.opacity = '0';
        card.style.transform = 'translateY(6px)';
        setTimeout(() => { card.remove(); updateCount(); }, 260);
      }
      knownIds.delete(id);

    } catch(e) {
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg> ORDER READY';
      btn.classList.remove('marking');
    }
  }

  function updateCount() {
    const count = document.querySelectorAll('.order-card').length;
    document.getElementById('orderCount').textContent = count;
    document.getElementById('emptyState').style.display = count === 0 ? 'flex' : 'none';
    document.getElementById('ordersGrid').style.display = count === 0 ? 'none' : 'grid';
  }

  /* RENDER */
  let knownIds = new Set();

  function renderOrders(orders) {
    const grid  = document.getElementById('ordersGrid');
    const empty = document.getElementById('emptyState');

    document.getElementById('orderCount').textContent = orders.length;

    if (!orders.length) {
      grid.style.display  = 'none';
      empty.style.display = 'flex';
      return;
    }
    grid.style.display  = 'grid';
    empty.style.display = 'none';

    grid.querySelectorAll('.order-card').forEach(c => {
      if (!orders.find(o => o.id === c.dataset.id)) c.remove();
    });

    orders.forEach(order => {
      const mins  = getMins(order.created_at);
      const isNew = !knownIds.has(order.id);
      if (isNew) knownIds.add(order.id);

      const existing = grid.querySelector(`[data-id="${order.id}"]`);
      if (existing) {
        const tn = existing.querySelector('.card-timer-num');
        if (tn) { tn.textContent = mins; tn.className = 'card-timer-num ' + timerClass(mins); }
        existing.className = 'order-card ' + cardClass(mins);
        return;
      }

      if (isNew && knownIds.size > 1) playBeep();

      const items = Array.isArray(order.items) ? order.items : [];
      const itemsHtml = items.map(it => `
        <div class="card-item">
          <div class="card-item-qty">${esc(it.qty)}</div>
          <div class="card-item-info">
            <div class="card-item-name">${esc(it.name)}</div>
            ${it.mods ? `<div class="card-item-mods">${esc(it.mods)}</div>` : ''}
          </div>
          <div class="card-item-price">$${parseFloat(it.price || 0).toFixed(2)}</div>
        </div>`).join('');

      const el = document.createElement('div');
      el.className = 'order-card ' + (isNew ? 'new-order ' : '') + cardClass(mins);
      el.dataset.id = order.id;
      el.innerHTML = `
        <div class="card-top">
          <div class="card-top-left">
            <span class="card-order-num">${esc(order.order_num)}</span>
            ${isNew ? '<span class="card-new-badge">New</span>' : ''}
          </div>
          <span class="card-placed-time">${new Date(order.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})}</span>
        </div>

        <div class="card-customer">
          <div>
            <div class="card-customer-name">${esc(order.customer_name)}</div>
            <div class="card-customer-phone">${esc(order.customer_phone)}</div>
          </div>
          <div class="card-timer">
            <div class="card-timer-num ${timerClass(mins)}">${mins}</div>
            <div class="card-timer-lbl">mins</div>
          </div>
        </div>

        <div class="card-items">${itemsHtml}</div>

        ${order.notes ? `
        <div class="card-notes">
          <div class="card-notes-lbl">Customer Note</div>
          <div class="card-notes-txt">${esc(order.notes)}</div>
        </div>` : ''}

        <div class="card-footer">
          <div class="card-totals">
            <div class="card-totals-detail">
              <div>Subtotal &nbsp;$${parseFloat(order.subtotal||0).toFixed(2)}</div>
              <div>Tax &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$${parseFloat(order.tax||0).toFixed(2)}</div>
              ${parseFloat(order.tip||0)>0?`<div>Tip &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$${parseFloat(order.tip).toFixed(2)}</div>`:''}
            </div>
            <div class="card-total-amount">$${parseFloat(order.total||0).toFixed(2)}</div>
          </div>
          <button class="card-ready-btn" onclick="markReady('${order.id}', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>
            Order Ready
          </button>
        </div>`;

      grid.prepend(el);
    });

    document.getElementById('lastRefresh').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',timeZone:'America/New_York'});
  }

  /* FETCH */
  async function fetchOrders() {
    try {
      const res    = await fetch(
        SUPA_URL + '/rest/v1/orders?status=eq.pending&order=created_at.asc&limit=50',
        { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } }
      );
      const orders = await res.json();
      renderOrders(Array.isArray(orders) ? orders : []);
      document.getElementById('liveText').textContent = 'Live';
    } catch(e) {
      document.getElementById('liveText').textContent = 'Reconnecting...';
    }
  }

  /* START */
  function startKDS() {
    updateClock();
    setInterval(updateClock, 1000);
    fetchOrders();
    setInterval(fetchOrders, 15000);
  }
</script>
</body>
</html>
