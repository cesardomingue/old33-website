<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Old 33</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:   #c8881a;
      --green:  #16a34a;
      --red:    #dc2626;
      --bg:     #0a0a0a;
      --card:   #111111;
      --border: #1f1f1f;
      --border2:#2a2a2a;
      --white:  #f0ede8;
      --gray:   #666;
      --dim:    #3a3a3a;
    }

    html, body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--white); min-height: 100%; }

    /* ── PIN ── */
    #pinScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .pin-wrap { display: flex; flex-direction: column; align-items: center; gap: 30px; }
    .pin-brand { text-align: center; }
    .pin-brand-tag { font-size: 10px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
    .pin-brand-name { font-family: 'Oswald', sans-serif; font-size: 48px; font-weight: 700; color: var(--white); letter-spacing: 4px; }
    .pin-brand-rule { width: 40px; height: 2px; background: var(--gold); margin: 14px auto 0; }
    .pin-brand-sub { font-size: 11px; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
    .pin-label { font-size: 12px; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; }
    .pin-dots { display: flex; gap: 16px; }
    .pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; transition: all .15s; }
    .pin-dot.filled { background: var(--gold); border-color: var(--gold); }
    .pin-error { font-size: 12px; color: var(--red); height: 16px; text-align: center; }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 76px); gap: 10px; }
    .pin-btn { width: 76px; height: 76px; border-radius: 50%; border: 1px solid var(--border2); background: #161616; color: var(--white); font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 500; cursor: pointer; transition: background .12s, transform .1s; display: flex; align-items: center; justify-content: center; }
    .pin-btn:active { background: var(--gold); color: #000; transform: scale(.93); }
    .pin-btn.zero { grid-column: 2; }
    .pin-btn.del { background: transparent; border-color: transparent; color: var(--gray); font-size: 20px; }

    /* ── HEADER ── */
    .adm-header {
      background: #0d0d0d; border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 62px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .adm-brand { display: flex; align-items: center; gap: 14px; }
    .adm-badge { width: 36px; height: 36px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; color: #000; flex-shrink: 0; }
    .adm-brand-name { font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 600; color: var(--white); letter-spacing: 1.5px; line-height: 1; }
    .adm-brand-sub { font-size: 10px; color: var(--gray); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
    .adm-header-right { display: flex; align-items: center; gap: 16px; }
    .adm-date { font-size: 12px; color: var(--gray); }
    .adm-refresh { background: #1a1a1a; border: 1px solid var(--border2); color: var(--gray); padding: 7px 14px; border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; transition: all .15s; }
    .adm-refresh:hover { border-color: var(--gold); color: var(--white); }

    /* ── BODY ── */
    .adm-body { padding: 28px; max-width: 1400px; margin: 0 auto; }

    /* ── PERIOD ── */
    .period-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .period-tabs { display: flex; gap: 3px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
    .period-tab { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--gray); transition: all .15s; border: none; background: transparent; font-family: 'Inter', sans-serif; }
    .period-tab.active { background: var(--gold); color: #000; font-weight: 600; }
    .period-title { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 600; color: var(--white); letter-spacing: 1px; }

    /* ── METRICS ── */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; }
    .metric-label { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
    .metric-value { font-family: 'Oswald', sans-serif; font-size: 36px; font-weight: 700; line-height: 1; color: var(--white); }
    .metric-value.gold  { color: var(--gold); }
    .metric-value.green { color: #22c55e; }
    .metric-sub { font-size: 11px; color: var(--dim); margin-top: 8px; }

    /* ── BOTTOM ── */
    .bottom-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
    @media (max-width: 1000px) { .bottom-grid { grid-template-columns: 1fr; } }

    /* ── SECTION ── */
    .section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .section-hdr { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .section-title { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1.5px; color: var(--white); }
    .section-meta { font-size: 11px; color: var(--gray); }

    /* ── TABLE ── */
    .ord-table { width: 100%; border-collapse: collapse; }
    .ord-table th { padding: 10px 20px; text-align: left; font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; border-bottom: 1px solid var(--border); background: #0d0d0d; white-space: nowrap; }
    .ord-table td { padding: 13px 20px; font-size: 13px; border-bottom: 1px solid #161616; vertical-align: middle; }
    .ord-table tr:last-child td { border-bottom: none; }
    .ord-table tbody tr:hover td { background: #141414; }

    .td-order-num { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--gold); letter-spacing: 1.5px; white-space: nowrap; }
    .td-date { font-size: 11px; color: var(--gray); margin-top: 3px; white-space: nowrap; }
    .td-name { font-size: 14px; font-weight: 600; color: var(--white); }
    .td-phone { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .td-items { font-size: 12px; color: var(--gray); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .td-breakdown { font-size: 11px; color: var(--gray); line-height: 1.8; white-space: nowrap; }
    .td-total { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; color: var(--white); white-space: nowrap; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .badge-done    { background: rgba(22,163,74,.1);  color: #22c55e; border: 1px solid rgba(22,163,74,.2); }
    .badge-pending { background: rgba(200,136,26,.1); color: var(--gold); border: 1px solid rgba(200,136,26,.2); }
    .no-data { padding: 48px 20px; text-align: center; color: var(--dim); font-size: 13px; }

    /* ── TOP ITEMS ── */
    .item-row { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-bottom: 1px solid #161616; }
    .item-row:last-child { border-bottom: none; }
    .item-rank { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--dim); width: 22px; text-align: center; flex-shrink: 0; }
    .item-rank.top { color: var(--gold); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 600; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-ct { font-size: 11px; color: var(--gray); margin-top: 2px; }
    .item-bar-wrap { width: 60px; height: 3px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
    .item-bar { height: 3px; background: var(--gold); border-radius: 2px; transition: width .5s ease; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    @media (max-width: 600px) {
      .adm-body { padding: 16px; }
      .adm-header { padding: 0 16px; }
      .adm-date { display: none; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- PIN -->
<div id="pinScreen">
  <div class="pin-wrap">
    <div class="pin-brand">
      <div class="pin-brand-tag">Admin Dashboard</div>
      <div class="pin-brand-name">OLD 33</div>
      <div class="pin-brand-rule"></div>
      <div class="pin-brand-sub">Beer &amp; Burger Grill &nbsp;&middot;&nbsp; Elkton, VA</div>
    </div>
    <div class="pin-label">Enter PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn zero" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinDel()">&#9003;</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="adm-header">
  <div class="adm-brand">
    <div class="adm-badge">33</div>
    <div>
      <div class="adm-brand-name">OLD 33</div>
      <div class="adm-brand-sub">Admin Dashboard</div>
    </div>
  </div>
  <div class="adm-header-right">
    <div class="adm-date" id="headerDate"></div>
    <button class="adm-refresh" onclick="loadData()">&#8635; Refresh</button>
  </div>
</div>

<!-- BODY -->
<div class="adm-body">

  <div class="period-row">
    <div class="period-title" id="periodTitle">Today</div>
    <div class="period-tabs">
      <button class="period-tab active" onclick="setPeriod('today',this)">Today</button>
      <button class="period-tab" onclick="setPeriod('week',this)">This Week</button>
      <button class="period-tab" onclick="setPeriod('month',this)">This Month</button>
      <button class="period-tab" onclick="setPeriod('all',this)">All Time</button>
    </div>
  </div>

  <!-- METRICS -->
  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-label">Revenue</div>
      <div class="metric-value gold" id="m-revenue">—</div>
      <div class="metric-sub" id="m-revenue-sub">&nbsp;</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Orders</div>
      <div class="metric-value" id="m-orders">—</div>
      <div class="metric-sub" id="m-orders-sub">&nbsp;</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Avg Order</div>
      <div class="metric-value" id="m-avg">—</div>
      <div class="metric-sub">per order</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Tax Collected</div>
      <div class="metric-value" id="m-tax">—</div>
      <div class="metric-sub">total tax</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Tips</div>
      <div class="metric-value green" id="m-tips">—</div>
      <div class="metric-sub">total tips</div>
    </div>
  </div>

  <!-- ORDERS + TOP ITEMS -->
  <div class="bottom-grid">
    <div class="section">
      <div class="section-hdr">
        <div class="section-title">Orders</div>
        <div class="section-meta" id="orders-meta"></div>
      </div>
      <div style="overflow-x:auto;" id="ordersWrap">
        <div class="no-data">Loading...</div>
      </div>
    </div>

    <div class="section">
      <div class="section-hdr">
        <div class="section-title">Top Items</div>
        <div class="section-meta" id="items-meta"></div>
      </div>
      <div id="topItemsWrap">
        <div class="no-data">Loading...</div>
      </div>
    </div>
  </div>

</div>

<script>
  const SUPA_URL = 'https://nfanxvqfyfqcbsdgxowq.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mYW54dnFmeWZxY2JzZGd4b3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Nzk3OTAsImV4cCI6MjA5MDU1NTc5MH0.mdcX5W246-ccjyQTeEXFTupa0lWE1nHXBAWN9r16OCs';
  const PIN = '3300';

  let allOrders = [];
  let period = 'today';

  /* ── PIN ── */
  let pinEntry = '';
  function pinPress(n) {
    if (pinEntry.length >= 4) return;
    pinEntry += n;
    document.getElementById('d' + (pinEntry.length - 1)).classList.add('filled');
    if (pinEntry.length === 4) {
      setTimeout(() => {
        if (pinEntry === PIN) {
          const ps = document.getElementById('pinScreen');
          ps.style.transition = 'opacity .35s';
          ps.style.opacity = '0';
          setTimeout(() => ps.style.display = 'none', 350);
          init();
        } else {
          document.getElementById('pinError').textContent = 'Incorrect PIN';
          pinEntry = '';
          for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.remove('filled');
          setTimeout(() => document.getElementById('pinError').textContent = '', 1800);
        }
      }, 180);
    }
  }
  function pinDel() {
    if (!pinEntry.length) return;
    pinEntry = pinEntry.slice(0, -1);
    document.getElementById('d' + pinEntry.length).classList.remove('filled');
    document.getElementById('pinError').textContent = '';
  }

  /* ── INIT ── */
  function init() {
    document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric', timeZone: 'America/New_York'
    });
    loadData();
  }

  /* ── PERIOD ── */
  const periodLabels = { today: 'Today', week: 'This Week', month: 'This Month', all: 'All Time' };
  function setPeriod(p, btn) {
    period = p;
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('periodTitle').textContent = periodLabels[p];
    render();
  }

  function filterOrders(orders) {
    if (period === 'all') return orders;
    const now = new Date();
    const et  = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    return orders.filter(o => {
      const d  = new Date(o.created_at);
      const de = new Date(d.toLocaleString('en-US', { timeZone: 'America/New_York' }));
      if (period === 'today') {
        return de.getFullYear() === et.getFullYear() && de.getMonth() === et.getMonth() && de.getDate() === et.getDate();
      }
      if (period === 'week') {
        const cut = new Date(et); cut.setDate(et.getDate() - 7); return de >= cut;
      }
      if (period === 'month') {
        return de.getFullYear() === et.getFullYear() && de.getMonth() === et.getMonth();
      }
    });
  }

  /* ── LOAD ── */
  async function loadData() {
    try {
      const res = await fetch(
        SUPA_URL + '/rest/v1/orders?order=created_at.desc&limit=500',
        { headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY } }
      );
      const data = await res.json();
      allOrders = Array.isArray(data) ? data : [];
      render();
    } catch(e) {
      document.getElementById('ordersWrap').innerHTML = '<div class="no-data">Failed to load. Check connection.</div>';
    }
  }

  function render() {
    const orders = filterOrders(allOrders);
    renderMetrics(orders);
    renderOrders(orders);
    renderTopItems(orders);
  }

  /* ── HELPERS ── */
  function fmt(n) { return '$' + parseFloat(n || 0).toFixed(2); }
  function esc(s) {
    return String(s || '').replace(/[<>&"']/g, c =>
      ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' }[c]));
  }

  /* ── METRICS ── */
  function renderMetrics(orders) {
    const total = orders.reduce((s, o) => s + parseFloat(o.total   || 0), 0);
    const tax   = orders.reduce((s, o) => s + parseFloat(o.tax     || 0), 0);
    const tips  = orders.reduce((s, o) => s + parseFloat(o.tip     || 0), 0);
    const avg   = orders.length ? total / orders.length : 0;
    const done  = orders.filter(o => o.status === 'done').length;
    const pend  = orders.filter(o => o.status === 'pending').length;

    document.getElementById('m-revenue').textContent     = fmt(total);
    document.getElementById('m-revenue-sub').textContent = done + ' completed';
    document.getElementById('m-orders').textContent      = orders.length;
    document.getElementById('m-orders-sub').textContent  = pend + ' pending';
    document.getElementById('m-avg').textContent         = fmt(avg);
    document.getElementById('m-tax').textContent         = fmt(tax);
    document.getElementById('m-tips').textContent        = fmt(tips);
  }

  /* ── ORDERS ── */
  function renderOrders(orders) {
    const wrap = document.getElementById('ordersWrap');
    document.getElementById('orders-meta').textContent = orders.length + ' orders';

    if (!orders.length) {
      wrap.innerHTML = '<div class="no-data">No orders for this period.</div>';
      return;
    }

    const rows = orders.map(o => {
      const items   = Array.isArray(o.items) ? o.items : [];
      const preview = items.map(i => i.qty + '× ' + i.name).join(', ');
      const time    = new Date(o.created_at).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZone:'America/New_York' });
      const date    = new Date(o.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', timeZone:'America/New_York' });
      const badge   = o.status === 'done'
        ? '<span class="badge badge-done">Done</span>'
        : '<span class="badge badge-pending">Pending</span>';
      const tip = parseFloat(o.tip || 0);

      return `<tr>
        <td>
          <div class="td-order-num">${esc(o.order_num)}</div>
          <div class="td-date">${date} &middot; ${time}</div>
        </td>
        <td>
          <div class="td-name">${esc(o.customer_name)}</div>
          <div class="td-phone">${esc(o.customer_phone)}</div>
        </td>
        <td><div class="td-items">${esc(preview)}</div></td>
        <td class="td-breakdown">
          <div>Sub &nbsp;${fmt(o.subtotal)}</div>
          <div>Tax &nbsp;&nbsp;${fmt(o.tax)}</div>
          ${tip > 0 ? `<div>Tip &nbsp;&nbsp;${fmt(tip)}</div>` : ''}
        </td>
        <td><div class="td-total">${fmt(o.total)}</div></td>
        <td>${badge}</td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `<table class="ord-table">
      <thead><tr>
        <th>Order</th>
        <th>Customer</th>
        <th>Items</th>
        <th>Breakdown</th>
        <th>Total</th>
        <th>Status</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  /* ── TOP ITEMS ── */
  function renderTopItems(orders) {
    const wrap = document.getElementById('topItemsWrap');
    const counts = {};

    orders.forEach(o => {
      (Array.isArray(o.items) ? o.items : []).forEach(it => {
        counts[it.name] = (counts[it.name] || 0) + (parseInt(it.qty) || 1);
      });
    });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 12);
    document.getElementById('items-meta').textContent = sorted.length + ' items';

    if (!sorted.length) {
      wrap.innerHTML = '<div class="no-data">No data yet.</div>';
      return;
    }

    const max = sorted[0][1];
    wrap.innerHTML = sorted.map(([name, count], i) => `
      <div class="item-row">
        <div class="item-rank ${i === 0 ? 'top' : ''}">${i + 1}</div>
        <div class="item-info">
          <div class="item-name">${esc(name)}</div>
          <div class="item-ct">${count} ordered</div>
        </div>
        <div class="item-bar-wrap">
          <div class="item-bar" style="width:${Math.round(count / max * 100)}%"></div>
        </div>
      </div>`).join('');
  }
</script>
</body>
</html>
